<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR Code Generator</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 40px 36px;
      width: 100%;
      max-width: 460px;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #111;
      margin-bottom: 4px;
    }

    .subtitle {
      color: #666;
      font-size: 0.9rem;
      margin-bottom: 28px;
    }

    .field {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: #333;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    input[type="text"], select {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 0.95rem;
      color: #111;
      background: #fafafa;
      transition: border-color 0.2s;
      appearance: none;
    }

    input[type="text"]:focus, select:focus {
      outline: none;
      border-color: #6366f1;
      background: #fff;
    }

    .select-wrapper {
      position: relative;
    }

    .select-wrapper::after {
      content: "▾";
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      color: #666;
      font-size: 0.9rem;
    }

    .color-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .color-row select { flex: 1; }

    .color-swatch {
      width: 34px;
      height: 34px;
      border-radius: 6px;
      border: 1.5px solid #ddd;
      flex-shrink: 0;
      background: #000;
      background-image:
        linear-gradient(45deg, #ccc 25%, transparent 25%),
        linear-gradient(-45deg, #ccc 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #ccc 75%),
        linear-gradient(-45deg, transparent 75%, #ccc 75%);
      background-size: 8px 8px;
      background-position: 0 0, 0 4px, 4px -4px, -4px 0px;
    }

    .color-swatch .inner {
      width: 100%;
      height: 100%;
      border-radius: 5px;
    }

    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    .btn:active { transform: scale(0.98); }

    .btn-primary {
      background: #6366f1;
      color: #fff;
      margin-top: 8px;
    }

    .btn-primary:hover { opacity: 0.9; }

    .btn-download {
      background: #10b981;
      color: #fff;
      margin-top: 10px;
      display: none;
    }

    .btn-download:hover { opacity: 0.9; }

    .preview-area {
      margin-top: 28px;
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    .preview-label {
      font-size: 0.8rem;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 12px;
      align-self: flex-start;
    }

    .canvas-wrapper {
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.12);
      background-image:
        linear-gradient(45deg, #e0e0e0 25%, transparent 25%),
        linear-gradient(-45deg, #e0e0e0 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #e0e0e0 75%),
        linear-gradient(-45deg, transparent 75%, #e0e0e0 75%);
      background-size: 16px 16px;
      background-position: 0 0, 0 8px, 8px -8px, -8px 0px;
    }

    canvas { display: block; }

    .error {
      color: #ef4444;
      font-size: 0.85rem;
      margin-top: 6px;
      display: none;
    }

    .divider {
      border: none;
      border-top: 1.5px dashed #e5e7eb;
      margin: 22px 0 20px;
    }

    .section-title {
      font-size: 0.78rem;
      font-weight: 700;
      color: #6366f1;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 16px;
    }

    .optional-badge {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 600;
      color: #888;
      background: #f3f4f6;
      border-radius: 4px;
      padding: 1px 6px;
      margin-left: 6px;
      vertical-align: middle;
      text-transform: none;
      letter-spacing: 0;
    }

    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    input[type="range"] {
      width: 100%;
      accent-color: #6366f1;
      cursor: pointer;
    }

    .range-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .range-value {
      font-size: 0.85rem;
      font-weight: 600;
      color: #333;
      min-width: 34px;
      text-align: right;
    }
  </style>
</head>
<body>
<div class="card">
  <h1>QR Code Generator</h1>
  <p class="subtitle">Create a custom QR code and download it as a PNG.</p>

  <div class="field">
    <label for="urlInput">URL or Text</label>
    <input type="text" id="urlInput" placeholder="https://example.com" autocomplete="off" />
    <div class="error" id="urlError">Please enter a URL or some text.</div>
  </div>

  <div class="field">
    <label>Fill Color <span style="font-weight:400;text-transform:none;color:#888">(QR squares)</span></label>
    <div class="color-row">
      <div class="select-wrapper" style="flex:1">
        <select id="fillColor">
          <option value="#000000">Black</option>
          <option value="#212121">Charcoal</option>
          <option value="#1a237e">Navy Blue</option>
          <option value="#1e88e5">Blue</option>
          <option value="#0d47a1">Dark Blue</option>
          <option value="#00897b">Teal</option>
          <option value="#43a047">Green</option>
          <option value="#2e7d32">Dark Green</option>
          <option value="#e53935">Red</option>
          <option value="#b71c1c">Dark Red</option>
          <option value="#f4511e">Orange</option>
          <option value="#fb8c00">Amber</option>
          <option value="#8e24aa">Purple</option>
          <option value="#4a148c">Deep Purple</option>
          <option value="#d81b60">Pink</option>
          <option value="#6d4c41">Brown</option>
          <option value="#546e7a">Blue Grey</option>
          <option value="#757575">Grey</option>
          <option value="#ffffff">White</option>
        </select>
      </div>
      <div class="color-swatch" id="fillSwatch"><div class="inner" style="background:#000"></div></div>
    </div>
  </div>

  <div class="field">
    <label>Background Color</label>
    <div class="color-row">
      <div class="select-wrapper" style="flex:1">
        <select id="backColor">
          <option value="transparent">Transparent</option>
          <option value="#ffffff">White</option>
          <option value="#f5f5f5">Light Grey</option>
          <option value="#fafafa">Off White</option>
          <option value="#000000">Black</option>
          <option value="#212121">Charcoal</option>
          <option value="#1a237e">Navy Blue</option>
          <option value="#1e88e5">Blue</option>
          <option value="#00897b">Teal</option>
          <option value="#43a047">Green</option>
          <option value="#e53935">Red</option>
          <option value="#f4511e">Orange</option>
          <option value="#8e24aa">Purple</option>
          <option value="#d81b60">Pink</option>
          <option value="#fffde7">Cream Yellow</option>
          <option value="#e3f2fd">Light Blue</option>
          <option value="#f3e5f5">Lavender</option>
          <option value="#e8f5e9">Mint</option>
        </select>
      </div>
      <div class="color-swatch" id="backSwatch">
        <div class="inner" style="background:transparent"></div>
      </div>
    </div>
  </div>

  <hr class="divider" />
  <div class="section-title">Text Overlay <span class="optional-badge">optional</span></div>

  <div class="field">
    <label for="overlayText">Label Text</label>
    <input type="text" id="overlayText" placeholder='e.g. "1st Timers"' autocomplete="off" />
  </div>

  <div class="two-col">
    <div class="field">
      <label>Text Color</label>
      <div class="select-wrapper">
        <select id="textColor">
          <option value="#000000">Black</option>
          <option value="#ffffff">White</option>
          <option value="#1a237e">Navy Blue</option>
          <option value="#1e88e5">Blue</option>
          <option value="#e53935">Red</option>
          <option value="#43a047">Green</option>
          <option value="#8e24aa">Purple</option>
          <option value="#f4511e">Orange</option>
          <option value="#d81b60">Pink</option>
          <option value="#6d4c41">Brown</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label>Badge Color</label>
      <div class="select-wrapper">
        <select id="badgeColor">
          <option value="#ffffff">White</option>
          <option value="#000000">Black</option>
          <option value="#f5f5f5">Light Grey</option>
          <option value="#fffde7">Cream Yellow</option>
          <option value="#e3f2fd">Light Blue</option>
          <option value="#f3e5f5">Lavender</option>
          <option value="#e8f5e9">Mint</option>
          <option value="#fce4ec">Blush Pink</option>
          <option value="#1a237e">Navy Blue</option>
          <option value="#e53935">Red</option>
          <option value="#43a047">Green</option>
          <option value="#8e24aa">Purple</option>
          <option value="#f4511e">Orange</option>
        </select>
      </div>
    </div>
  </div>

  <div class="field">
    <label>Font Size <span style="font-weight:400;text-transform:none;color:#888">(px)</span></label>
    <div class="range-row">
      <input type="range" id="fontSize" min="16" max="72" value="40" />
      <span class="range-value" id="fontSizeVal">40px</span>
    </div>
  </div>

  <button class="btn btn-primary" id="generateBtn">Generate QR Code</button>

  <div class="preview-area" id="previewArea">
    <div class="preview-label">Preview</div>
    <div class="canvas-wrapper">
      <canvas id="qrCanvas"></canvas>
    </div>
    <button class="btn btn-download" id="downloadBtn">Download PNG</button>
  </div>
</div>

<script>
  const fillSelect  = document.getElementById('fillColor');
  const backSelect  = document.getElementById('backColor');
  const fillSwatch  = document.getElementById('fillSwatch').querySelector('.inner');
  const backSwatch  = document.getElementById('backSwatch').querySelector('.inner');
  const urlInput    = document.getElementById('urlInput');
  const urlError    = document.getElementById('urlError');
  const generateBtn = document.getElementById('generateBtn');
  const downloadBtn = document.getElementById('downloadBtn');
  const previewArea = document.getElementById('previewArea');
  const canvas      = document.getElementById('qrCanvas');
  const overlayInput = document.getElementById('overlayText');
  const textColorSel = document.getElementById('textColor');
  const badgeColorSel = document.getElementById('badgeColor');
  const fontSizeSlider = document.getElementById('fontSize');
  const fontSizeVal    = document.getElementById('fontSizeVal');

  fontSizeSlider.addEventListener('input', () => {
    fontSizeVal.textContent = fontSizeSlider.value + 'px';
  });

  const CHECKER = 'linear-gradient(45deg,#bbb 25%,transparent 25%),' +
                  'linear-gradient(-45deg,#bbb 25%,transparent 25%),' +
                  'linear-gradient(45deg,transparent 75%,#bbb 75%),' +
                  'linear-gradient(-45deg,transparent 75%,#bbb 75%)';

  function updateSwatch(select, swatch) {
    const val = select.value;
    if (val === 'transparent') {
      swatch.style.background = 'transparent';
      swatch.style.backgroundImage = CHECKER;
      swatch.style.backgroundSize = '8px 8px';
      swatch.style.backgroundPosition = '0 0,0 4px,4px -4px,-4px 0px';
    } else {
      swatch.style.backgroundImage = '';
      swatch.style.background = val;
    }
  }

  fillSelect.addEventListener('change', () => updateSwatch(fillSelect, fillSwatch));
  backSelect.addEventListener('change', () => updateSwatch(backSelect, backSwatch));
  updateSwatch(fillSelect, fillSwatch);
  updateSwatch(backSelect, backSwatch);

  generateBtn.addEventListener('click', async () => {
    const text = urlInput.value.trim();
    if (!text) {
      urlError.style.display = 'block';
      urlInput.focus();
      return;
    }
    urlError.style.display = 'none';

    const fill = fillSelect.value;
    const back = backSelect.value;
    const isTransparent = back === 'transparent';
    const lightColor = isTransparent ? '#ffffff' : back;

    try {
      await QRCode.toCanvas(canvas, text, {
        width: 300,
        margin: 4,
        color: { dark: fill, light: lightColor },
        errorCorrectionLevel: 'H',
      });

      if (isTransparent) {
        makeTransparent(canvas, lightColor);
      }

      const overlayText = overlayInput.value.trim();
      if (overlayText) {
        drawTextOverlay(canvas, overlayText, {
          fontSize: parseInt(fontSizeSlider.value),
          textColor: textColorSel.value,
          badgeColor: badgeColorSel.value,
        });
      }

      previewArea.style.display = 'flex';
      downloadBtn.style.display = 'block';
    } catch (err) {
      alert('Could not generate QR code: ' + err.message);
    }
  });

  function drawTextOverlay(canvas, text, { fontSize, textColor, badgeColor }) {
    const ctx = canvas.getContext('2d');
    ctx.font = `bold ${fontSize}px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif`;

    const metrics = ctx.measureText(text);
    const textW = metrics.width;
    const textH = fontSize; // close enough for cap height
    const padding = Math.round(fontSize * 0.35);
    const radius  = Math.round(fontSize * 0.25);

    const rectX = (canvas.width  - textW) / 2 - padding;
    const rectY = (canvas.height - textH) / 2 - padding;
    const rectW = textW + padding * 2;
    const rectH = textH + padding * 2;

    // Rounded badge background
    ctx.beginPath();
    ctx.moveTo(rectX + radius, rectY);
    ctx.lineTo(rectX + rectW - radius, rectY);
    ctx.quadraticCurveTo(rectX + rectW, rectY, rectX + rectW, rectY + radius);
    ctx.lineTo(rectX + rectW, rectY + rectH - radius);
    ctx.quadraticCurveTo(rectX + rectW, rectY + rectH, rectX + rectW - radius, rectY + rectH);
    ctx.lineTo(rectX + radius, rectY + rectH);
    ctx.quadraticCurveTo(rectX, rectY + rectH, rectX, rectY + rectH - radius);
    ctx.lineTo(rectX, rectY + radius);
    ctx.quadraticCurveTo(rectX, rectY, rectX + radius, rectY);
    ctx.closePath();
    ctx.fillStyle = badgeColor;
    ctx.fill();

    // Centered text
    ctx.fillStyle = textColor;
    ctx.textBaseline = 'top';
    ctx.fillText(text, (canvas.width - textW) / 2, rectY + padding);
  }

  // Turn the solid background color pixels into transparent ones
  function makeTransparent(canvas, bgHex) {
    const ctx = canvas.getContext('2d');
    const { width, height } = canvas;
    const imageData = ctx.getImageData(0, 0, width, height);
    const d = imageData.data;

    const [br, bg, bb] = hexToRgb(bgHex);
    const tolerance = 30;

    for (let i = 0; i < d.length; i += 4) {
      if (
        Math.abs(d[i]   - br) < tolerance &&
        Math.abs(d[i+1] - bg) < tolerance &&
        Math.abs(d[i+2] - bb) < tolerance
      ) {
        d[i+3] = 0;
      }
    }
    ctx.putImageData(imageData, 0, 0);
  }

  function hexToRgb(hex) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return [r, g, b];
  }

  downloadBtn.addEventListener('click', () => {
    const link = document.createElement('a');
    link.download = 'qrcode.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  });

  urlInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') generateBtn.click();
  });
</script>
</body>
</html>
